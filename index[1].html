<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TE AMO BUBU</title>
    <link rel="icon" href="icono.png" type="image/png">
    <link rel="apple-touch-icon" href="icono.png">
    <style>
        body { background-color: #0077be; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #caja-contador { position: fixed; top: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 12px; font-size: 16px; z-index: 1000; border: 1px solid rgba(255,255,255,0.2); }
        #titulo-principal { margin-top: 65px; font-size: 22px; }
        .pez { position: absolute; font-size: 35px; cursor: pointer; z-index: 10; user-select: none; transition: transform 0.2s; }
        .pez:active { transform: scale(1.4); }
        @keyframes nadoH { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(80px); } }
        @keyframes nadoV { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-80px); } }
        #p1 { top: 15%; left: 10%; animation: nadoH 10s infinite; } #p2 { top: 25%; left: 80%; animation: nadoV 12s infinite; }
        #p3 { top: 65%; left: 15%; animation: nadoH 14s infinite; } #p4 { top: 80%; left: 65%; animation: nadoV 11s infinite; }
        #p5 { top: 45%; left: 85%; animation: nadoH 13s infinite; } #p6 { top: 10%; left: 60%; animation: nadoV 15s infinite; }
        #p7 { top: 55%; left: 40%; animation: nadoH 12s infinite; } #p8 { top: 75%; left: 5%; animation: nadoV 10s infinite; }
        #p9 { top: 35%; left: 50%; animation: nadoH 16s infinite; } #p10 { top: 90%; left: 20%; animation: nadoV 14s infinite; }
        #p11 { top: 5%; left: 30%; animation: nadoH 11s infinite; } #p12 { top: 60%; left: 90%; animation: nadoV 13s infinite; }
        #p13 { top: 20%; left: 45%; animation: nadoH 15s infinite; } #p14 { top: 40%; left: 10%; animation: nadoV 12s infinite; }
        #p15 { top: 85%; left: 40%; animation: nadoH 14s infinite; } #p16 { top: 30%; left: 70%; animation: nadoV 11s infinite; }
        #p17 { top: 50%; left: 75%; animation: nadoH 13s infinite; } #p18 { top: 95%; left: 80%; animation: nadoV 15s infinite; }
        #p19 { top: 15%; left: 90%; animation: nadoH 12s infinite; } #p20 { top: 70%; left: 50%; animation: nadoV 10s infinite; }
        .efecto { position: absolute; pointer-events: none; animation: subir 3s forwards; z-index: 5; }
        .corazon { color: #A020F0; font-size: 20px; }
        .burbuja { width: 12px; height: 12px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        @keyframes subir { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-250px); opacity: 0; } }
        #caja-sorpresa { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 225px; border: 6px solid white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 2000; background: white; overflow: hidden; transition: opacity 0.8s; }
        #sorpresa-img { width: 100%; height: 100%; object-fit: cover; }
        #nota { font-weight: bold; padding: 10px; transition: all 0.3s; }
    </style>
</head>
<body onclick="crearEfectos(event)">
    <div id="caja-contador">Contador: <span id="contador-numero">x0</span> = 🎁</div>
    <div class="oceano">
        <h1 id="titulo-principal">Nuestro Acuario Mágico ❤️</h1>
        <div id="caja-sorpresa" onclick="event.stopPropagation(); ocultarFoto()">
            <img id="sorpresa-img" src="sorpresa.jpg">
        </div>
        <div class="pez" id="p1" onclick="tocarPez('¡Eres mi bióloga favorita! 🐬')">🐠</div>
        <div class="pez" id="p2" onclick="tocarPez('¡La mejor novia del mundo! 🏖️')">🐟</div>
        <div class="pez" id="p3" onclick="tocarPez('Eres mi tesoro 💎')">🐡</div>
        <div class="pez" id="p4" onclick="tocarPez('¡Cada día te amo más! 😍')">🦑</div>
        <div class="pez" id="p5" onclick="tocarPez('Eres mi persona favorita 🌟')">🐙</div>
        <div class="pez" id="p6" onclick="tocarPez('¡Juntos por siempre! 💑')">🦀</div>
        <div class="pez" id="p7" onclick="tocarPez('Me encantas 🥰')">🐬</div>
        <div class="pez" id="p8" onclick="tocarPez('Eres increíble ✨')">🐳</div>
        <div class="pez" id="p9" onclick="tocarPez('Contigo soy feliz 😄')">🦈</div>
        <div class="pez" id="p10" onclick="tocarPez('Te extraño ❤️')">🐊</div>
        <div class="pez" id="p11" onclick="tocarPez('Bubu es la mejor 🏆')">🐠</div>
        <div class="pez" id="p12" onclick="tocarPez('Amo tu sonrisa 😊')">🐟</div>
        <div class="pez" id="p13" onclick="tocarPez('Eres mi sol ☀️')">🐡</div>
        <div class="pez" id="p14" onclick="tocarPez('Todo es mejor contigo 💞')">🦑</div>
        <div class="pez" id="p15" onclick="tocarPez('Me robaste el corazón 💘')">🐙</div>
        <div class="pez" id="p16" onclick="tocarPez('¡Mi amor bonito! 🎉')">🦀</div>
        <div class="pez" id="p17" onclick="tocarPez('Gracias por existir 🙏')">🐬</div>
        <div class="pez" id="p18" onclick="tocarPez('Eres perfecta para mí 🌹')">🐳</div>
        <div class="pez" id="p19" onclick="tocarPez('Te adoro con mi alma 🤗')">🦈</div>
        <div class="pez" id="p20" onclick="tocarPez('Siempre tuya 🤝')">🐊</div>
        <p id="nota" onclick="revisarDescarga()">Toca el agua o a los peces...</p>
    </div>

    <script>
        let cuentaAmor = 0;
        let indiceFoto = 0;
        let tFoto;
        let finalAlcanzado = false;
        const misFotos = [
            "sorpresa.jpg", "sorpresa1.jpg", "sorpresa2.jpg", "sorpresa3.jpg", "sorpresa4.jpg",
            "sorpresa5.jpg", "sorpresa6.jpg", "sorpresa7.jpg", "sorpresa8.jpg", "sorpresa9.jpg",
            "sorpresa10.jpg", "sorpresa11.jpg", "sorpresa12.jpg", "sorpresa13.jpg", "sorpresa14.jpg",
            "sorpresa15.jpg", "sorpresa16.jpg", "sorpresa17.jpg", "sorpresa18.jpg", "sorpresa19.jpg"
        ];

        function crearEfectos(e) {
            contarAmor();
            const b = document.createElement("div");
            b.className = "efecto burbuja";
            b.style.left = e.pageX + "px"; b.style.top = e.pageY + "px";
            document.body.appendChild(b);
            const c = document.createElement("div");
            c.className = "efecto corazon";
            c.innerHTML = "💜";
            c.style.left = (e.pageX + 20) + "px"; c.style.top = e.pageY + "px";
            document.body.appendChild(c);
            setTimeout(() => { b.remove(); c.remove(); }, 2500);
        }

        function descargarCarta() {
            const link = document.createElement('a');
            link.href = 'historia.pdf';
            link.download = 'Nuestra_Historia.pdf';
            link.click();
        }

        function revisarDescarga() {
            if(finalAlcanzado) descargarCarta();
        }

        function tocarPez(m) {
            event.stopPropagation();
            contarAmor();
            if(!finalAlcanzado) document.getElementById("nota").innerHTML = m;
        }

        function contarAmor() {
            cuentaAmor++;
            document.getElementById("contador-numero").innerHTML = "x" + cuentaAmor;
            
            if (cuentaAmor % 10 === 0 && indiceFoto < 20) {
                const caja = document.getElementById("caja-sorpresa");
                document.getElementById("sorpresa-img").src = misFotos[indiceFoto];
                caja.style.display = "block";
                caja.style.opacity = "1";
                
                let numSorpresa = indiceFoto + 1;
                
                if (numSorpresa === 20) {
                    finalAlcanzado = true;
                    iniciarBucleFinal();
                    descargarCarta();
                } else {
                    document.getElementById("nota").innerHTML = "¡SORPRESA " + numSorpresa + "/20! 🎁";
                }
                
                indiceFoto++;
                clearTimeout(tFoto);
                tFoto = setTimeout(ocultarFoto, 5000);
            }
        }

        function iniciarBucleFinal() {
            const nota = document.getElementById("nota");
            setInterval(() => {
                nota.innerHTML = (nota.innerHTML === "¡SORPRESA 20/20! 🎁") ? "¡TÓCAME PARA DESCARGAR! ❤️📖" : "¡SORPRESA 20/20! 🎁";
                nota.style.color = (nota.style.color === "rgb(160, 32, 240)") ? "white" : "#A020F0";
            }, 1000);
        }

        function ocultarFoto() {
            const caja = document.getElementById("caja-sorpresa");
            caja.style.opacity = "0";
            setTimeout(() => { caja.style.display = "none"; }, 800);
        }
    </script>
</body>
</html>
